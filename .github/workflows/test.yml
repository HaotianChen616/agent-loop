name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile sources and scenarios
        run: python -m compileall -q src tests scenarios
