schema_version = 1
scenario_id = "hello-loop"
title = "通过验证反馈修正实现"
learning_objective = "观察执行、验证失败、吸收反馈并再次执行的闭环"
goal = "修改 implementation.txt，使其满足 requirements.txt 中的全部要求"
acceptance_criteria = [
  "requirements-file-unchanged",
  "implementation-matches",
]
instructions = ["skill.md"]
allowed_tools = ["list_files", "read_file", "write_file"]

[workspace]
seed = "fixture"
read_only = ["requirements.txt"]

[agent]
kind = "scripted"
script = "scripted_actions.json"

[verification]
script = "checks/verify.py"
timeout_seconds = 5

[budget]
max_iterations = 6
max_agent_calls = 6
max_tool_calls = 6
max_verifications = 7
max_elapsed_seconds = 30
max_same_failure = 2
